name: Jest Tests

env:
  PARSE_ENV: "dev"
  PARSE_APP_ID: "myAppId"
  PARSE_JAVASCRIPT_KEY: "_PLACEHOLDER_"
  PARSE_SERVER_URL: "http://localhost:1337/parse"
  PUENTE_ENV: "dev"
  PUENTE_SMS_EMAIL_API_URL: "http://puentes-messaging-microservice.com"
  PUENTE_MANAGE_URL: "https://sample-puente-manage.app/"
  SLACK_TOKEN: ""
  SLACK_DEV_CHANNEL: ""
  SLACK_PROD_CHANNEL: ""

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev
jobs:
  jest-testing:
    # ubuntu-22.04: mongodb-memory-server 8.x mis-detects newer runners and
    # downloads OpenSSL 1.1 mongod builds that can't start there
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --no-coverage
